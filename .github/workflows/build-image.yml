name: "Build NethSecurity image"

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'staging'
      - 'release'
    paths:
      - 'builder/**'
      - 'config/**'
      - 'files/**'
      - 'packages/**'
      - 'patches/**'
      - 'build.conf.defaults'
      - 'build-nethsec.sh'
  pull_request:
    paths:
      - 'builder/**'
      - 'config/**'
      - 'files/**'
      - 'packages/**'
      - 'patches/**'
      - 'build.conf.defaults'
      - 'build-nethsec.sh'

jobs:
  publish_images:
    name: 'Build NethSecurity image'
    runs-on: self-hosted
    outputs:
      BASE_VERSION: ${{ steps.build_vars.outputs.BASE_VERSION }}
      NETHSECURITY_VERSION: ${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}
      REPO_CHANNEL: ${{ steps.build_vars.outputs.REPO_CHANNEL }}
    env:
      APK_PUB_KEY: ${{ secrets.APK_PUB_KEY }}
      APK_PRIV_KEY: ${{ secrets.APK_PRIV_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate build variables
        id: build_vars
        run: |
          # export OWRT_VERSION from build.conf.defaults
          echo "OWRT_VERSION=$(grep -oP 'OWRT_VERSION=\K.*' build.conf.defaults)" >> $GITHUB_OUTPUT

          # export TARGET from build.conf.defaults
          echo "TARGET=$(grep -oP 'TARGET=\K.*' build.conf.defaults)" >> $GITHUB_OUTPUT

          # export base NETHSECURITY_VERSION from build.conf.defaults
          BASE_VERSION=$(grep -oP 'NETHSECURITY_VERSION=\K.*' build.conf.defaults)
          echo "BASE_VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          COMMIT_HASH=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          RUN_NUMBER="${{ github.run_number }}"

          if [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            CHANNEL_NAME="PR${{ github.event.number }}"
            BUILD_SEMVER_SUFFIX="-${CHANNEL_NAME}.${RUN_NUMBER}.${TIMESTAMP}.${COMMIT_HASH}"
            FULL_VERSION="${BASE_VERSION}${BUILD_SEMVER_SUFFIX}"
            echo "REPO_CHANNEL=${CHANNEL_NAME}" >> $GITHUB_OUTPUT
            echo "BUILD_SEMVER_SUFFIX=${BUILD_SEMVER_SUFFIX}" >> $GITHUB_OUTPUT
            echo "NETHSECURITY_VERSION=${FULL_VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == 'main' ]]; then
            BUILD_SEMVER_SUFFIX="-dev.${RUN_NUMBER}.${TIMESTAMP}.${COMMIT_HASH}"
            FULL_VERSION="${BASE_VERSION}${BUILD_SEMVER_SUFFIX}"
            echo "REPO_CHANNEL=dev" >> $GITHUB_OUTPUT
            echo "BUILD_SEMVER_SUFFIX=${BUILD_SEMVER_SUFFIX}" >> $GITHUB_OUTPUT
            echo "NETHSECURITY_VERSION=${FULL_VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == 'staging' || "${{ github.ref_name }}" == 'release' ]]; then
            echo "REPO_CHANNEL=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "BUILD_SEMVER_SUFFIX=" >> $GITHUB_OUTPUT
            echo "NETHSECURITY_VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            CHANNEL_NAME="${{ github.ref_name }}"
            BUILD_SEMVER_SUFFIX="-${CHANNEL_NAME}.${RUN_NUMBER}.${TIMESTAMP}.${COMMIT_HASH}"
            FULL_VERSION="${BASE_VERSION}${BUILD_SEMVER_SUFFIX}"
            echo "REPO_CHANNEL=${CHANNEL_NAME}" >> $GITHUB_OUTPUT
            echo "BUILD_SEMVER_SUFFIX=${BUILD_SEMVER_SUFFIX}" >> $GITHUB_OUTPUT
            echo "NETHSECURITY_VERSION=${FULL_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "::error::Unsupported event/ref combination"
            exit 1
          fi
      - name: Build the image
        env:
          OWRT_VERSION: ${{ steps.build_vars.outputs.OWRT_VERSION }}
          NETHSECURITY_VERSION: ${{ steps.build_vars.outputs.BASE_VERSION }}
          REPO_CHANNEL: ${{ steps.build_vars.outputs.REPO_CHANNEL }}
          TARGET: ${{ steps.build_vars.outputs.TARGET }}
          BUILD_SEMVER_SUFFIX: ${{ steps.build_vars.outputs.BUILD_SEMVER_SUFFIX }}
        run: ./build-nethsec.sh
      - name: Update latest_release file
        run: |
          FULL_VERSION="${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}"
          echo "${FULL_VERSION}" > latest_release
          echo "::notice title='Build published':: ${FULL_VERSION}"
      - uses: actions/upload-artifact@v7
        name: Upload image
        with:
          name: image
          compression-level: 0
          path: |
            bin/targets/**/nethsecurity-*combined-efi.img.gz
      - uses: actions/upload-artifact@v7
        name: Upload manifest file
        with:
          name: manifest
          path: bin/targets/**/nethsecurity-*.manifest
      - uses: actions/upload-artifact@v7
        name: Upload SBOM
        with:
          name: sbom
          path: bin/targets/**/nethsecurity-*.bom.cdx.json
      - uses: actions/upload-artifact@v7
        if: always()
        name: Upload logs
        with:
          name: build-logs
          path: |
            build-logs
      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
      - name: Copy Packages to repo
        env:
          RCLONE_CONFIG_REPO_PROVIDER: DigitalOcean
          RCLONE_CONFIG_REPO_TYPE: s3
          RCLONE_CONFIG_REPO_ENV_AUTH: true
          RCLONE_CONFIG_REPO_ACL: public-read
          RCLONE_CONFIG_REPO_ENDPOINT: ams3.digitaloceanspaces.com
          RCLONE_CONFIG_REPO_ACCESS_KEY_ID: ${{ secrets.DO_SPACE_ACCESS_KEY }}
          RCLONE_CONFIG_REPO_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACE_SECRET_KEY }}
        run: |
          RELEASE_DIR="repo:nethsecurity/${{ steps.build_vars.outputs.REPO_CHANNEL }}/${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}"
          TARGETS_DIR="${RELEASE_DIR}/targets"
          PUBLISH_TARGETS=true

          if [[ "${{ steps.build_vars.outputs.REPO_CHANNEL }}" == 'release' || "${{ steps.build_vars.outputs.REPO_CHANNEL }}" == 'staging' ]]; then
            if [[ -n "$(rclone lsf "${TARGETS_DIR}" --recursive --files-only 2>/dev/null | head -n 1 || true)" ]]; then
              PUBLISH_TARGETS=false
              echo "::notice title='Image upload skipped':: Image artifacts already exist for ${{ steps.build_vars.outputs.REPO_CHANNEL }}/${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}"
            fi
          fi

          rclone sync bin/packages "${RELEASE_DIR}/packages" --progress --create-empty-src-dirs

          if [[ "${PUBLISH_TARGETS}" == 'true' ]]; then
            rclone sync bin/targets "${TARGETS_DIR}" --progress --create-empty-src-dirs
          fi

          rclone copy latest_release repo:nethsecurity/${{ steps.build_vars.outputs.REPO_CHANNEL }}/ --progress

  tools:
    name: 'Run tools'
    runs-on: ubuntu-24.04
    needs: publish_images
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
      - name: Run tools
        env:
          CDN_NAME: 'updates.nethsecurity.nethserver.org'
          NETHSECURITY_VERSION: ${{ needs.publish_images.outputs.NETHSECURITY_VERSION }}
          REPO_CHANNEL: ${{ needs.publish_images.outputs.REPO_CHANNEL }}
        run: |
          tools/issue-comment
