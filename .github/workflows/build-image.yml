name: "Build NethSecurity image"

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'builder/**'
      - 'config/**'
      - 'files/**'
      - 'packages/**'
      - 'patches/**'
      - 'build.conf.defaults'
      - 'build-nethsec.sh'
  pull_request:
    paths:
      - 'builder/**'
      - 'config/**'
      - 'files/**'
      - 'packages/**'
      - 'patches/**'
      - 'build.conf.defaults'
      - 'build-nethsec.sh'

jobs:
  publish_images:
    name: 'Build NethSecurity image'
    runs-on: self-hosted
    outputs:
      NETHSECURITY_VERSION: ${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}
      REPO_CHANNEL: ${{ steps.build_vars.outputs.REPO_CHANNEL }}
    env:
      USIGN_PUB_KEY: ${{ secrets.USIGN_PUB_KEY }}
      USIGN_PRIV_KEY: ${{ secrets.USIGN_PRIV_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate build variables
        id: build_vars
        run: |
          # export OWRT_VERSION from build.conf.defaults
          echo "OWRT_VERSION=$(grep -oP 'OWRT_VERSION=\K.*' build.conf.defaults)" >> $GITHUB_OUTPUT

          # export TARGET from build.conf.defaults
          echo "TARGET=$(grep -oP 'TARGET=\K.*' build.conf.defaults)" >> $GITHUB_OUTPUT

          # export base NETHSECURITY_VERSION from build.conf.defaults
          BASE_VERSION=$(grep -oP 'NETHSECURITY_VERSION=\K.*' build.conf.defaults)
          echo "BASE_VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          COMMIT_HASH=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')

          # When pushing to main branch, set REPO_CHANNEL to dev
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "REPO_CHANNEL=dev" >> $GITHUB_OUTPUT
            # Append -dev.<timestamp>.<commit_hash> for easy sorting
            echo "NETHSECURITY_VERSION=${BASE_VERSION}-dev.${TIMESTAMP}.${COMMIT_HASH}" >> $GITHUB_OUTPUT

          # Otherwise, get the branch name for branch channel builds
          elif [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            BRANCH_NAME="${{ github.head_ref }}"
            echo "REPO_CHANNEL=${BRANCH_NAME}" >> $GITHUB_OUTPUT
            # Append -<branch>.<timestamp>.<commit_hash> for easy sorting
            echo "NETHSECURITY_VERSION=${BASE_VERSION}-${BRANCH_NAME}.${TIMESTAMP}.${COMMIT_HASH}" >> $GITHUB_OUTPUT
          fi
      - name: Build the image
        env:
          OWRT_VERSION: ${{ steps.build_vars.outputs.OWRT_VERSION }}
          NETHSECURITY_VERSION: ${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}
          REPO_CHANNEL: ${{ steps.build_vars.outputs.REPO_CHANNEL }}
          TARGET: ${{ steps.build_vars.outputs.TARGET }}
        run: ./build-nethsec.sh
      - name: Update latest_release file
        run: |
          # Create release file with the built version
          echo "${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}" > latest_release
          echo "::notice title='Image published':: ${{ steps.build_vars.outputs.NETHSECURITY_VERSION }}"
      - uses: actions/upload-artifact@v7
        name: Upload image
        with:
          name: image
          compression-level: 0
          path: |
            bin/targets/**/nethsecurity-*combined-efi.img.gz
      - uses: actions/upload-artifact@v7
        name: Upload manifest file
        with:
          name: manifest
          path: bin/targets/**/nethsecurity-*.manifest
      - uses: actions/upload-artifact@v7
        name: Upload SBOM
        with:
          name: sbom
          path: bin/targets/**/nethsecurity-*.bom.cdx.json
      - uses: actions/upload-artifact@v7
        if: always()
        name: Upload logs
        with:
          name: build-logs
          path: |
            build-logs
      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
      - name: Copy Packages to repo
        env:
          RCLONE_CONFIG_REPO_PROVIDER: DigitalOcean
          RCLONE_CONFIG_REPO_TYPE: s3
          RCLONE_CONFIG_REPO_ENV_AUTH: true
          RCLONE_CONFIG_REPO_ACL: public-read
          RCLONE_CONFIG_REPO_ENDPOINT: ams3.digitaloceanspaces.com
          RCLONE_CONFIG_REPO_ACCESS_KEY_ID: ${{ secrets.DO_SPACE_ACCESS_KEY }}
          RCLONE_CONFIG_REPO_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACE_SECRET_KEY }}
        run: |
          # Sync binaries to channel/version/
          rclone sync bin/ repo:nethsecurity/${{ steps.build_vars.outputs.REPO_CHANNEL }}/${{ steps.build_vars.outputs.BASE_VERSION }} --progress --create-empty-src-dirs
          
          # Place latest_release inside the version directory
          rclone copy latest_release repo:nethsecurity/${{ steps.build_vars.outputs.REPO_CHANNEL }}/${{ steps.build_vars.outputs.BASE_VERSION }}/ --progress
          
          # Also place latest_release at channel root as fallback
          rclone copy latest_release repo:nethsecurity/${{ steps.build_vars.outputs.REPO_CHANNEL }}/ --progress

  tools:
    name: 'Run tools'
    runs-on: ubuntu-24.04
    needs: publish_images
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
      - name: Run tools
        env:
          CDN_NAME: 'updates.nethsecurity.nethserver.org'
          NETHSECURITY_VERSION: ${{ needs.publish_images.outputs.NETHSECURITY_VERSION }}
          REPO_CHANNEL: ${{ needs.publish_images.outputs.REPO_CHANNEL }}
        run: |
          tools/issue-comment
