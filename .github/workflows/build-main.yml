name: "Build NethSecurity image (main)"

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/**'
      - 'builder/**'
      - 'config/**'
      - 'files/**'
      - 'packages/**'
      - 'patches/**'
      - 'build.conf.defaults'
      - 'build-nethsec.sh'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'builder/**'
      - 'config/**'
      - 'files/**'
      - 'packages/**'
      - 'patches/**'
      - 'build.conf.defaults'
      - 'build-nethsec.sh'

jobs:
  vars:
    name: 'Compute build variables'
    runs-on: ubuntu-24.04
    outputs:
      owrt_version: ${{ steps.compute.outputs.owrt_version }}
      target: ${{ steps.compute.outputs.target }}
      base_version: ${{ steps.compute.outputs.base_version }}
      repo_channel: ${{ steps.compute.outputs.repo_channel }}
      build_semver_suffix: ${{ steps.compute.outputs.build_semver_suffix }}
      nethsecurity_version: ${{ steps.compute.outputs.nethsecurity_version }}
    steps:
      - uses: actions/checkout@v7
      - name: Compute build variables
        id: compute
        run: |
          OWRT_VERSION=$(grep -oP 'OWRT_VERSION=\K.*' build.conf.defaults)
          TARGET=$(grep -oP 'TARGET=\K.*' build.conf.defaults)
          BASE_VERSION=$(grep -oP 'NETHSECURITY_VERSION=\K.*' build.conf.defaults)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          RUN_NUMBER="${{ github.run_number }}"

          echo "owrt_version=${OWRT_VERSION}" >> $GITHUB_OUTPUT
          echo "target=${TARGET}" >> $GITHUB_OUTPUT
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            CHANNEL_NAME="PR${{ github.event.number }}"
            BUILD_SEMVER_SUFFIX="-${CHANNEL_NAME}.${RUN_NUMBER}.${TIMESTAMP}.${COMMIT_HASH}"
            FULL_VERSION="${BASE_VERSION}${BUILD_SEMVER_SUFFIX}"
            echo "repo_channel=${CHANNEL_NAME}" >> $GITHUB_OUTPUT
            echo "build_semver_suffix=${BUILD_SEMVER_SUFFIX}" >> $GITHUB_OUTPUT
            echo "nethsecurity_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          else
            BUILD_SEMVER_SUFFIX="-dev.${RUN_NUMBER}.${TIMESTAMP}.${COMMIT_HASH}"
            FULL_VERSION="${BASE_VERSION}${BUILD_SEMVER_SUFFIX}"
            echo "repo_channel=dev" >> $GITHUB_OUTPUT
            echo "build_semver_suffix=${BUILD_SEMVER_SUFFIX}" >> $GITHUB_OUTPUT
            echo "nethsecurity_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: vars
    uses: ./.github/workflows/build-image.yml
    with:
      repo_channel: ${{ needs.vars.outputs.repo_channel }}
      build_semver_suffix: ${{ needs.vars.outputs.build_semver_suffix }}
      nethsecurity_version: ${{ needs.vars.outputs.nethsecurity_version }}
      owrt_version: ${{ needs.vars.outputs.owrt_version }}
      target: ${{ needs.vars.outputs.target }}
      base_version: ${{ needs.vars.outputs.base_version }}
    secrets: inherit

  tools:
    name: 'Run tools'
    runs-on: ubuntu-24.04
    needs: [vars, build]
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
      - name: Run tools
        env:
          CDN_NAME: 'updates.nethsecurity.nethserver.org'
          NETHSECURITY_VERSION: ${{ needs.vars.outputs.nethsecurity_version }}
          REPO_CHANNEL: ${{ needs.vars.outputs.repo_channel }}
        run: |
          tools/issue-comment
