# OS and system metrics collection
# Includes CPU, memory, disk, network, and kernel statistics
# All metrics from this section are tagged with influxdb_db=os-metrics

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false
  [inputs.cpu.tags]
    influxdb_db = "os-metrics"

[[inputs.disk]]
  # On OpenWrt, /overlay (f2fs) is the physical storage and / (overlayfs) is the
  # user-visible root with identical stats. Collect / directly so metrics and alerts show "/" not
  # "/overlay". Removing "overlay" from ignore_fs allows the overlayfs root to be
  # collected; mount_points restricts collection to /, /boot, and /mnt/data only.
  mount_points = ["/", "/boot", "/mnt/data"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "aufs", "squashfs"]
  [inputs.disk.tags]
    influxdb_db = "os-metrics"

[[inputs.mem]]
  [inputs.mem.tags]
    influxdb_db = "os-metrics"

[[inputs.processes]]
  [inputs.processes.tags]
    influxdb_db = "os-metrics"

[[inputs.system]]
  [inputs.system.tags]
    influxdb_db = "os-metrics"

[[inputs.bond]]
  [inputs.bond.tags]
    influxdb_db = "os-metrics"

[[inputs.ethtool]]
  ## List of interfaces to include (default: all up interfaces)
  # interface_include = ["eth0"]
  ## List of interfaces to ignore (default: none)
  interface_exclude = ["wg*", "ipsec*", "tun*", "br*", "ifb-*", "pppoe-*", "eth*.*"]

  [inputs.ethtool.tags]
    influxdb_db = "os-metrics"

[[inputs.net]]
  [inputs.net.tags]
    influxdb_db = "os-metrics"

[[inputs.netstat]]
  [inputs.netstat.tags]
    influxdb_db = "os-metrics"

[[inputs.nstat]]
  proc_net_netstat = "/proc/net/netstat"
  proc_net_snmp = "/proc/net/snmp"
  proc_net_snmp6 = "/proc/net/snmp6"
  dump_zeros = true
  [inputs.nstat.tags]
    influxdb_db = "os-metrics"


# Read metrics about disk I/O
[[inputs.diskio]]
  ## By default, telegraf will gather stats for all devices.
  ## Setting devices will restrict the stats to the specified devices.
  # devices = ["sda", "sdb", "vd*"]

  ## Uncomment the following line if you need disk serial numbers.
  # skip_serial_number = false
  [inputs.diskio.tags]
    influxdb_db = "os-metrics"


# Collect metrics from the nf_conntrack kernel module
[[inputs.conntrack]]
  files = ["nf_conntrack_count", "nf_conntrack_max"]
  dirs = ["/proc/sys/net/netfilter", "/proc/sys/net/netfilter"]
  [inputs.conntrack.tags]
    influxdb_db = "os-metrics"

