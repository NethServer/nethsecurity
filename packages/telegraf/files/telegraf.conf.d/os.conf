# OS and system metrics collection
# Includes CPU, memory, disk, network, and kernel statistics
# All metrics from this section are tagged with influxdb_db=os-metrics

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false
  [inputs.cpu.tags]
    influxdb_db = "os-metrics"

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
  [inputs.disk.tags]
    influxdb_db = "os-metrics"

[[inputs.mem]]
  [inputs.mem.tags]
    influxdb_db = "os-metrics"

[[inputs.processes]]
  [inputs.processes.tags]
    influxdb_db = "os-metrics"

[[inputs.system]]
  [inputs.system.tags]
    influxdb_db = "os-metrics"

[[inputs.bond]]
  [inputs.bond.tags]
    influxdb_db = "os-metrics"

[[inputs.ethtool]]
  ## List of interfaces to include (default: all up interfaces)
  # interface_include = ["eth0"]
  ## List of interfaces to ignore (default: none)
  interface_exclude = ["wg*", "ipsec*", "tun*"]

  [inputs.ethtool.tags]
    influxdb_db = "os-metrics"

[[inputs.net]]
  ## Skip protocol stats, use inputs.nstat instead (fixes deprecation warning)
  ignore_protocol_stats = true
  [inputs.net.tags]
    influxdb_db = "os-metrics"

[[inputs.netstat]]
  [inputs.netstat.tags]
    influxdb_db = "os-metrics"

[[inputs.nstat]]
  proc_net_netstat = "/proc/net/netstat"
  proc_net_snmp = "/proc/net/snmp"
  proc_net_snmp6 = "/proc/net/snmp6"
  dump_zeros = true
  [inputs.nstat.tags]
    influxdb_db = "os-metrics"
