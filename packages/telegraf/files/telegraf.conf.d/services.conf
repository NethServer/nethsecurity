# Procd service status monitoring
# Collects running state for all procd-managed services via ubus.
# Persistent services (has_respawn=true) are the primary targets for alerting.
#
# Uses parsers.json_v2 — available in the default NethSecurity Telegraf build.

[[inputs.exec]]
  name_override = "procd_service"
  commands = ["/usr/libexec/telegraf-services"]
  interval = "60s"
  timeout = "10s"
  data_format = "json_v2"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.object]]
      path = "@this"
      tags = ["service", "instance", "has_respawn"]

  [inputs.exec.tags]
    influxdb_db = "os-metrics"
