# Procd service status monitoring
# Collects running state for a fixed whitelist of persistent services.
# Services with no instances are ignored by the collector.
#
# Uses parsers.json_v2 — available in the default NethSecurity Telegraf build.

[[inputs.exec]]
  name_override = "procd_service"
  commands = ["/usr/libexec/telegraf-services"]
  interval = "60s"
  timeout = "10s"
  data_format = "json_v2"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.object]]
      path = "@this"
      tags = ["service", "instance"]

  [inputs.exec.tags]
    influxdb_db = "os-metrics"
