# Backup encryption status monitoring
# Reports whether /etc/backup.pass is set so vmalert can alert on unencrypted backups.

[[inputs.exec]]
  name_override = "backup_encryption"
  commands = ["/usr/libexec/telegraf-backup-encryption"]
  interval = "60s"
  timeout = "5s"
  data_format = "json_v2"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.object]]
      path = "@this"

  [inputs.exec.tags]
    influxdb_db = "os-metrics"
