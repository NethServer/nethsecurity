# High-availability alert state monitoring
# Exports HA event/state metrics consumed by vmalert.

[[inputs.exec]]
  name_override = "ha_alert"
  commands = [["/usr/libexec/telegraf-ha-alert"]]
  interval = "60s"
  timeout = "5s"
  data_format = "json_v2"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.object]]
      path = "@this"
      tags = ["role", "instance"]

  [inputs.exec.tags]
    influxdb_db = "os-metrics"
