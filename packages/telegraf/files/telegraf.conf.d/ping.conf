# Ping input plugin - monitors ICMP ping to configured hosts
# Uses native method for better performance and no external dependencies

[[inputs.ping]]
  # Hosts to send ping packets to
  urls = []
  
  # Method: "native" for improved compatibility and performance
  # Uses privileged raw ICMP sockets (requires CAP_NET_RAW or root)
  method = "native"
  
  # Number of ping packets to send per interval
  count = 1
  
  # Time to wait between sending ping packets (seconds)
  ping_interval = 1.0
  
  # Total ping deadline (seconds)
  deadline = 10
  
  # Data size for ping packets (bytes)
  size = 56
  
  # Tags for metric routing
  [inputs.ping.tags]
    influxdb_db = "ping-metrics"
