# banIP blocked-IP monitoring

[[inputs.exec]]
  name_override = "banip"
  commands = [["sh", "-c", 'n=$(grep -e "$(date -d "-1 hour" +"%b %e %H:%M")" -e "$(date +"%b %e %H:")" /var/log/messages 2>/dev/null | grep -E "banIP.+add IP|banIP.+drop|banIP.+reject" | wc -l); printf "[{\042blocked_ips\042:%s}]\n" "$n"']]
  interval = "60s"
  timeout = "10s"
  data_format = "json_v2"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.object]]
      path = "@this"

  [inputs.exec.tags]
    influxdb_db = "os-metrics"
