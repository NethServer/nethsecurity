# mwan3 WAN interface status monitoring
# Reads /var/run/mwan3/iface_state/ — one file per interface, content is
# "online" or "offline".  No-ops silently when mwan3 is not running.
#
# Uses parsers.json_v2 — available in the default NethSecurity Telegraf build.

[[inputs.exec]]
  name_override = "mwan_interface"
  commands = ["/usr/libexec/telegraf-mwan"]
  interval = "60s"
  timeout = "10s"
  data_format = "json_v2"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.object]]
      path = "@this"
      tags = ["interface"]

  [inputs.exec.tags]
    influxdb_db = "os-metrics"
