# Storage status monitoring
# Reports whether the persistent data storage is mounted so vmalert can alert on storage:status.

[[inputs.exec]]
  name_override = "storage_status"
  commands = ["/usr/libexec/telegraf-storage-status"]
  interval = "60s"
  timeout = "5s"
  data_format = "json_v2"

  [[inputs.exec.json_v2]]
    [[inputs.exec.json_v2.object]]
      path = "@this"

  [inputs.exec.tags]
    influxdb_db = "os-metrics"
