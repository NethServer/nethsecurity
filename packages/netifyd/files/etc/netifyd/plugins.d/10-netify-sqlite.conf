# Netify Aggregator Processor Plugin Loader
#
##############################################################################

[proc-aggregator-sqlite]
enable = no
plugin_library = ${path_plugin_libdir}/libnetify-proc-aggregator.so.0.0.0
conf_filename = ${path_state_persistent}/netify-proc-aggregator-sqlite.json

[sink-sqlite]
enable = no
plugin_library = ${path_plugin_libdir}/libnetify-sink-sqlite.so.0.0.0
conf_filename = ${path_state_persistent}/netify-sink-sqlite.json

