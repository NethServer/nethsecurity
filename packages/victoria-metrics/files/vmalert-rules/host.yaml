# Victoria Metrics Alert Rules for Host and Hardware Monitoring
# 
# Based on: https://samber.github.io/awesome-prometheus-alerts/rules/basic-resource-monitoring/host-and-hardware/
# Adapted for Telegraf metrics names

groups:
  - name: "host_and_hardware"
    interval: "30s"
    rules:
      # CPU Monitoring
      - alert: HighCpuUsage
        expr: 'round(100 - avg(cpu_usage_idle), 0.1) > 70 unless round(100 - avg(cpu_usage_idle), 0.1) > 85'
        for: "5m"
        labels:
          severity: "info"
          service: "host"
        annotations:
          summary_en: "High CPU usage detected"
          summary_it: "Utilizzo elevato di CPU rilevato"
          description_en: "CPU usage is {{ $value }}%"
          description_it: "Utilizzo della CPU è {{ $value }}%"

      - alert: CriticalCpuUsage
        expr: 'round(100 - avg(cpu_usage_idle), 0.1) > 85'
        for: "2m"
        labels:
          severity: "warning"
          service: "host"
        annotations:
          summary_en: "Critical CPU usage detected"
          summary_it: "Utilizzo critico di CPU rilevato"
          description_en: "CPU usage is {{ $value }}%"
          description_it: "Utilizzo della CPU è {{ $value }}%"

      # Memory Monitoring
      - alert: HighMemoryUsage
        expr: 'round((mem_used / mem_total) * 100, 0.1) > 80 unless round((mem_used / mem_total) * 100, 0.1) > 90'
        for: "5m"
        labels:
          severity: "info"
          service: "host"
        annotations:
          summary_en: "High memory usage detected"
          summary_it: "Utilizzo elevato di memoria rilevato"
          description_en: "Memory usage is {{ $value }}%"
          description_it: "Utilizzo della memoria è {{ $value }}%"

      - alert: CriticalMemoryUsage
        expr: 'round((mem_used / mem_total) * 100, 0.1) > 90'
        for: "2m"
        labels:
          severity: "warning"
          service: "host"
        annotations:
          summary_en: "Critical memory usage detected"
          summary_it: "Utilizzo critico di memoria rilevato"
          description_en: "Memory usage is {{ $value }}%"
          description_it: "Utilizzo della memoria è {{ $value }}%"

      # Disk Space Monitoring
      - alert: DiskSpaceWarning
        expr: 'round((disk_used / disk_total) * 100, 0.1) > 80 unless round((disk_used / disk_total) * 100, 0.1) > 90'
        for: "5m"
        labels:
          severity: "warning"
          service: "storage"
        annotations:
          summary_en: "Disk space low on {{ $labels.path }}"
          summary_it: "Spazio disco in esaurimento su {{ $labels.path }}"
          description_en: "Disk usage is {{ $value }}% on {{ $labels.path }}"
          description_it: "Utilizzo del disco è {{ $value }}% su {{ $labels.path }}"

      - alert: DiskSpaceCritical
        expr: 'round((disk_used / disk_total) * 100, 0.1) > 90'
        for: "2m"
        labels:
          severity: "critical"
          service: "storage"
        annotations:
          summary_en: "Disk space critical on {{ $labels.path }}"
          summary_it: "Spazio disco critico su {{ $labels.path }}"
          description_en: "Disk usage is {{ $value }}% on {{ $labels.path }}"
          description_it: "Utilizzo del disco è {{ $value }}% su {{ $labels.path }}"

      # System Load Monitoring
      - alert: HighSystemLoad
        expr: 'system_load1 / system_n_cpus > 2'
        for: "5m"
        labels:
          severity: "warning"
          service: "host"
        annotations:
          summary_en: "High system load detected"
          summary_it: "Carico di sistema elevato rilevato"
          description_en: "System load is {{ $value }}"
          description_it: "Carico di sistema è {{ $value }}"

      # Network Interface Monitoring
      - alert: HighNetworkErrorsIn
        expr: 'increase(net_err_in[5m]) > 100'
        for: "5m"
        labels:
          severity: "warning"
          service: "network"
        annotations:
          summary_en: "High network errors (IN) on interface {{ $labels.interface }}"
          summary_it: "Errori di rete elevati (IN) su interfaccia {{ $labels.interface }}"
          description_en: "Network errors (IN) increased by {{ $value }} on {{ $labels.interface }}"
          description_it: "Errori di rete (IN) aumentati di {{ $value }} su {{ $labels.interface }}"

      - alert: HighNetworkErrorsOut
        expr: 'increase(net_err_out[5m]) > 100'
        for: "5m"
        labels:
          severity: "warning"
          service: "network"
        annotations:
          summary_en: "High network errors (OUT) on interface {{ $labels.interface }}"
          summary_it: "Errori di rete elevati (OUT) su interfaccia {{ $labels.interface }}"
          description_en: "Network errors (OUT) increased by {{ $value }} on {{ $labels.interface }}"
          description_it: "Errori di rete (OUT) aumentati di {{ $value }} su {{ $labels.interface }}"

      - alert: HighNetworkDropsIn
        expr: 'increase(net_drop_in[5m]) > 100'
        for: "5m"
        labels:
          severity: "warning"
          service: "network"
        annotations:
          summary_en: "High network drops (IN) on interface {{ $labels.interface }}"
          summary_it: "Perdite di rete elevate (IN) su interfaccia {{ $labels.interface }}"
          description_en: "Network drops (IN) increased by {{ $value }} on {{ $labels.interface }}"
          description_it: "Perdite di rete (IN) aumentate di {{ $value }} su {{ $labels.interface }}"

      - alert: HighNetworkDropsOut
        expr: 'increase(net_drop_out[5m]) > 100'
        for: "5m"
        labels:
          severity: "warning"
          service: "network"
        annotations:
          summary_en: "High network drops (OUT) on interface {{ $labels.interface }}"
          summary_it: "Perdite di rete elevate (OUT) su interfaccia {{ $labels.interface }}"
          description_en: "Network drops (OUT) increased by {{ $value }} on {{ $labels.interface }}"
          description_it: "Perdite di rete (OUT) aumentate di {{ $value }} su {{ $labels.interface }}"

      # Process Monitoring
      - alert: ProcessesZombiesAlert
        expr: 'processes_zombies > 5'
        for: "5m"
        labels:
          severity: "warning"
          service: "host"
        annotations:
          summary_en: "High number of zombie processes detected"
          summary_it: "Numero elevato di processi zombie rilevato"
          description_en: "Number of zombie processes is {{ $value }}"
          description_it: "Numero di processi zombie è {{ $value }}"

      - alert: ProcessesBlockedAlert
        expr: 'processes_blocked > 10'
        for: "5m"
        labels:
          severity: "warning"
          service: "host"
        annotations:
          summary_en: "High number of blocked processes detected"
          summary_it: "Numero elevato di processi bloccati rilevato"
          description_en: "Number of blocked processes is {{ $value }}"
          description_it: "Numero di processi bloccati è {{ $value }}"
