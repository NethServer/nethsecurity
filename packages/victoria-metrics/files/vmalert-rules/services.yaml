# Victoria Metrics Alert Rules for Service Monitoring
#
# Monitors procd-managed services via the procd_service_running metric
# collected by /usr/libexec/telegraf-services.
#
# Only services with has_respawn="true" trigger alerts — these are persistent
# daemons that procd is configured to keep running. Oneshot or optional
# services (adblock, ns-binding, etc.) are excluded.

groups:
  - name: "services"
    interval: "60s"
    rules:
      - alert: ServiceDown
        expr: 'procd_service_running{has_respawn="true"} == 0'
        for: "2m"
        labels:
          severity: "critical"
          alertgroup: "services"
        annotations:
          summary_en: "Service {{ $labels.service }} is down"
          summary_it: "Il servizio {{ $labels.service }} non è attivo"
          description_en: "Service {{ $labels.service }} (instance {{ $labels.instance }}) has been down for more than 2 minutes"
          description_it: "Il servizio {{ $labels.service }} (istanza {{ $labels.instance }}) non è attivo da più di 2 minuti"
