---
openapi: 3.1.0
info:
  title: NethSecurity RPCD APIs
  description: |
    Complete OpenAPI 3.1.0 specification for all `ns.*` RPCD API methods.
    
    ## How RPCD Methods Are Called
    
    Methods use the **ubus call convention** but are accessed through the nethsecurity-api Go server:
    
    1. **Device-side (direct ubus)**:
       ```bash
       ubus call ns.firewall list-zones '{"filter": "all"}'
       ```
    
    2. **Remote clients (via HTTP with JWT)**:
       ```bash
       POST /api/ubus/call
       {"path": "ns.firewall", "method": "list-zones", "payload": {"filter": "all"}}
       ```
    
    3. **OpenAPI paths**: `POST /ubus/{ns.name}/{method}`
    
    ## Error Handling
    
    All responses are HTTP 200, even for errors. The response JSON body indicates success or failure:
    - **Success**: `{data...}`
    - **API error**: `{"error": "error_code"}`
    - **Validation error**: `{"validation": {"errors": [...]}}`
  version: 3.5.3

servers:
  - url: "https://{host}/api"
    description: "Remote API (with JWT auth via nethsecurity-api)"
    variables:
      host:
        default: "192.168.1.1"
  - url: "http://localhost"
    description: "Local ubus calls (device-side)"

components:
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error code (lowercase, snake_case)
          example: invalid_filter

    ValidationErrorDetail:
      type: object
      required: [parameter, message, value]
      properties:
        parameter:
          type: string
          description: Name of the parameter that failed validation
          example: filter
        message:
          type: string
          description: Validation error code (lowercase, snake_case)
          example: invalid_regex
        value:
          description: The value that failed validation
          example: example

    ValidationError:
      type: object
      required: [validation]
      properties:
        validation:
          type: object
          required: [errors]
          properties:
            errors:
              type: array
              items:
                $ref: "#/components/schemas/ValidationErrorDetail"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/login

security:
  - BearerAuth: []

paths:
  POST /ubus/ns.netifyd/get-bypass:
    post:
      summary: Get DPI bypass lists
      description: Return the current IPv4 and IPv6 CIDR lists excluded from netifyd DPI inspection.
      operationId: ns.netifyd.get-bypass
      tags: [netifyd]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Current bypass lists
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [bypassv4, bypassv6]
                    properties:
                      bypassv4:
                        type: array
                        items:
                          type: string
                        description: IPv4 addresses or CIDRs bypassing DPI
                        example: ["192.168.100.0/24", "10.0.0.5"]
                      bypassv6:
                        type: array
                        items:
                          type: string
                        description: IPv6 addresses or CIDRs bypassing DPI
                        example: ["2001:db8::/32"]
                  - $ref: "#/components/schemas/Error"

  POST /ubus/ns.netifyd/set-bypass:
    post:
      summary: Set DPI bypass lists
      description: |
        Replace the IPv4 and IPv6 CIDR bypass lists in UCI (`netifyd.config.bypassv4` /
        `netifyd.config.bypassv6`). Lists are applied to the `nfq_bypass_v4` / `nfq_bypass_v6`
        nftables sets on the next firewall reload via `/usr/share/netifyd/netify.user`.
      operationId: ns.netifyd.set-bypass
      tags: [netifyd]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bypassv4, bypassv6]
              properties:
                bypassv4:
                  type: array
                  items:
                    type: string
                  description: IPv4 addresses or CIDRs to bypass DPI
                  example: ["192.168.100.0/24", "10.0.0.5"]
                bypassv6:
                  type: array
                  items:
                    type: string
                  description: IPv6 addresses or CIDRs to bypass DPI
                  example: ["2001:db8::/32"]
      responses:
        "200":
          description: Result of the operation
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: string
                        example: success
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
