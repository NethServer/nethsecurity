---
openapi: 3.1.0
info:
  title: NethSecurity RPCD APIs
  description: |
    Complete OpenAPI 3.1.0 specification for all `ns.*` RPCD API methods.
    
    ## How RPCD Methods Are Called
    
    Methods use the **ubus call convention** but are accessed through the nethsecurity-api Go server:
    
    1. **Device-side (direct ubus)**:
       ```bash
       ubus call ns.firewall list-zones '{"filter": "all"}'
       ```
    
    2. **Remote clients (via HTTP with JWT)**:
       ```bash
       POST /api/ubus/call
       {"path": "ns.firewall", "method": "list-zones", "payload": {"filter": "all"}}
       ```
    
    3. **OpenAPI paths**: `POST /ubus/{ns.name}/{method}`
    
    ## Error Handling
    
    All responses are HTTP 200, even for errors. The response JSON body indicates success or failure:
    - **Success**: `{data...}`
    - **API error**: `{"error": "error_code"}`
    - **Validation error**: `{"validation": {"errors": [...]}}`
  version: 3.5.3

servers:
  - url: "https://{host}/api"
    description: "Remote API (with JWT auth via nethsecurity-api)"
    variables:
      host:
        default: "192.168.1.1"
  - url: "http://localhost"
    description: "Local ubus calls (device-side)"

components:
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error code (lowercase, snake_case)
          example: invalid_filter

    ValidationErrorDetail:
      type: object
      required: [parameter, message, value]
      properties:
        parameter:
          type: string
          description: Name of the parameter that failed validation
          example: filter
        message:
          type: string
          description: Validation error code (lowercase, snake_case)
          example: invalid_regex
        value:
          description: The value that failed validation
          example: example

    ValidationError:
      type: object
      required: [validation]
      properties:
        validation:
          type: object
          required: [errors]
          properties:
            errors:
              type: array
              items:
                $ref: "#/components/schemas/ValidationErrorDetail"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/login

security:
  - BearerAuth: []

paths:
  POST /ubus/ns.ha/add-lan-interface:
    post:
      summary: Add a LAN interface to the HA keepalived configuration
      operationId: ns.ha.add-lan-interface
      tags:
        - ha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
                - primary_node_ip
                - backup_node_ip
                - virtual_ip
              properties:
                role:
                  type: string
                  enum: [primary, backup]
                  description: Node role executing the operation
                primary_node_ip:
                  type: string
                  description: Static IP of the interface on the primary node
                  example: 192.168.1.10
                backup_node_ip:
                  type: string
                  description: Static IP of the corresponding interface on the backup node
                  example: 192.168.1.11
                virtual_ip:
                  type: string
                  description: Virtual IP in CIDR notation
                  example: 192.168.1.1/24
      responses:
        "200":
          description: Interface added or validation failed
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [success]
                    properties:
                      success:
                        type: boolean
                        example: true
                  - $ref: "#/components/schemas/ValidationError"
                  - $ref: "#/components/schemas/Error"
  POST /ubus/ns.reverseproxy/add-certificate:
    post:
      summary: Add a custom certificate
      operationId: ns.reverseproxy.add-certificate
      tags:
        - reverseproxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - certificate_path
                - key_path
              properties:
                name:
                  type: string
                  description: Certificate name, must be unique and conform to UCI name format
                  example: my_certificate
                certificate_path:
                  type: string
                  description: Path to PEM X.509 certificate file (must not be expired)
                  example: /tmp/cert.pem
                key_path:
                  type: string
                  description: Path to PEM private key file (must match the certificate)
                  example: /tmp/key.pem
                chain_path:
                  type: string
                  description: Optional path to PEM certificate chain file
                  example: /tmp/chain.pem
      responses:
        "200":
          description: Certificate successfully added
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required:
                      - message
                    properties:
                      message:
                        type: string
                        example: success
                  - $ref: "#/components/schemas/ValidationError"
                  - $ref: "#/components/schemas/Error"
  POST /ubus/ns.telegraf/list-alerts:
    post:
      summary: List current monitoring alerts
      operationId: ns.telegraf.list-alerts
      tags:
        - telegraf
      responses:
        "200":
          description: Current pending and firing alerts evaluated by vmalert
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required:
                      - alerts
                    properties:
                      alerts:
                        type: array
                        items:
                          type: object
                          required:
                            - state
                            - name
                            - labels
                            - annotations
                            - activeAt
                          properties:
                            state:
                              type: string
                              description: Alert state reported by vmalert
                              example: firing
                            name:
                              type: string
                              description: Alert name
                              example: BackupEncryptionDisabled
                            value:
                              type: string
                              description: Evaluated expression value
                              example: "0"
                            labels:
                              type: object
                              description: Alert labels emitted by vmalert
                              additionalProperties:
                                type: string
                            annotations:
                              type: object
                              description: Localized summaries and descriptions emitted by vmalert
                              additionalProperties:
                                type: string
                            activeAt:
                              type: string
                              format: date-time
                              description: Time when the alert became active
                              example: "2026-05-07T09:18:00Z"
                            id:
                              type: string
                              description: Alert instance identifier
                            rule_id:
                              type: string
                              description: Alert rule identifier
                            group_id:
                              type: string
                              description: Alert group identifier
                            expression:
                              type: string
                              description: Alert rule expression
                            source:
                              type: string
                              description: vmalert source URL for the alert
                            restored:
                              type: boolean
                              description: True when the alert is being restored
                            stabilizing:
                              type: boolean
                              description: True when the alert is stabilizing
                  - $ref: "#/components/schemas/Error"
