---
openapi: 3.1.0
info:
  title: NethSecurity RPCD APIs
  description: |
    Complete OpenAPI 3.1.0 specification for all `ns.*` RPCD API methods.
    
    ## How RPCD Methods Are Called
    
    Methods use the **ubus call convention** but are accessed through the nethsecurity-api Go server:
    
    1. **Device-side (direct ubus)**:
       ```bash
       ubus call ns.firewall list-zones '{"filter": "all"}'
       ```
    
    2. **Remote clients (via HTTP with JWT)**:
       ```bash
       POST /api/ubus/call
       {"path": "ns.firewall", "method": "list-zones", "payload": {"filter": "all"}}
       ```
    
    3. **OpenAPI paths**: `POST /ubus/{ns.name}/{method}`
    
    ## Error Handling
    
    All responses are HTTP 200, even for errors. The response JSON body indicates success or failure:
    - **Success**: `{data...}`
    - **API error**: `{"error": "error_code"}`
    - **Validation error**: `{"validation": {"errors": [...]}}`
  version: 3.5.3

servers:
  - url: "https://{host}/api"
    description: "Remote API (with JWT auth via nethsecurity-api)"
    variables:
      host:
        default: "192.168.1.1"
  - url: "http://localhost"
    description: "Local ubus calls (device-side)"

components:
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error code (lowercase, snake_case)
          example: invalid_filter

    ValidationErrorDetail:
      type: object
      required: [parameter, message, value]
      properties:
        parameter:
          type: string
          description: Name of the parameter that failed validation
          example: filter
        message:
          type: string
          description: Validation error code (lowercase, snake_case)
          example: invalid_regex
        value:
          description: The value that failed validation
          example: example

    ValidationError:
      type: object
      required: [validation]
      properties:
        validation:
          type: object
          required: [errors]
          properties:
            errors:
              type: array
              items:
                $ref: "#/components/schemas/ValidationErrorDetail"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/login

security:
  - BearerAuth: []

paths:
  POST /ubus/ns.netifyd/list-bypasses:
    post:
      summary: List DPI bypass entries
      description: Return all IPv4 and IPv6 bypass entries stored in UCI, each with protocol, ip, and optional description.
      operationId: ns.netifyd.list-bypasses
      tags: [netifyd]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: List of bypass entries
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [bypasses]
                    properties:
                      bypasses:
                        type: array
                        items:
                          type: object
                          required: [protocol, ip, description]
                          properties:
                            protocol:
                              type: string
                              enum: [ipv4, ipv6]
                            ip:
                              type: string
                              example: 192.168.1.0/24
                            description:
                              type: string
                              example: My trusted subnet
                  - $ref: "#/components/schemas/Error"

  POST /ubus/ns.netifyd/create-bypass:
    post:
      summary: Add a DPI bypass entry
      description: |
        Append an IPv4 or IPv6 address/CIDR to the bypass list. The entry is stored in UCI as
        `<ip>|<description>`. The IP part is loaded into the `nfq_bypass_v4` / `nfq_bypass_v6`
        nftables sets on the next firewall reload.
      operationId: ns.netifyd.create-bypass
      tags: [netifyd]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [protocol, ip]
              properties:
                protocol:
                  type: string
                  enum: [ipv4, ipv6]
                  description: IP version of the address
                ip:
                  type: string
                  description: IPv4/IPv6 address or CIDR prefix
                  example: 192.168.1.0/24
                description:
                  type: string
                  description: Optional human-readable label
                  example: My trusted subnet
      responses:
        "200":
          description: Result of the operation
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: string
                        example: success
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"

  POST /ubus/ns.netifyd/delete-bypass:
    post:
      summary: Remove a DPI bypass entry
      description: Delete the bypass entry matching the given protocol and IP from UCI.
      operationId: ns.netifyd.delete-bypass
      tags: [netifyd]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [protocol, ip]
              properties:
                protocol:
                  type: string
                  enum: [ipv4, ipv6]
                ip:
                  type: string
                  example: 192.168.1.0/24
      responses:
        "200":
          description: Result of the operation
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: string
                        example: success
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
